[build]
  command = "node build.js"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Canonicalisation: send the www variant to the primary apex domain (HTTPS is forced by Netlify)
[[redirects]]
  from = "https://www.kppackaging.com/*"
  to = "https://kppackaging.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.kppackaging.com/*"
  to = "https://kppackaging.com/:splat"
  status = 301
  force = true

# Long-cache immutable static assets (images, fonts, icons)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# JS/CSS are cache-busted with ?v= so they can be cached long too
[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000"
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000"
